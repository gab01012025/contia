services:
  - type: web
    name: contia-backend
    env: node
    plan: starter
    region: oregon
    rootDir: backend
    buildCommand: apt-get update && apt-get install -y chromium && npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "CONTIA <no-reply@contia.io>"
      - key: ADMIN_NOTIFICATION_EMAIL
        value: mariaccarrizalesp@gmail.com
      - key: FRONTEND_URL
        sync: false
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
